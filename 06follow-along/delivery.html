<!doctype html>
<html lang="en">

<head>
    <meta name="description" content="Get your next meal delivered by drone.">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@200;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="delivery.css">

    <meta charset="UTF-8">
    <title>Drone Delivery Services LLC.</title>
</head>

<body>
    <!-- start the page header -->
    <header>
        <span>Drone Delivery </span>
    </header>

    <!-- start the page navigation -->
    <nav>
        <ul>
            <li><a href="index.html">About Us</a></li>
            <li class="active"><a href="delivery.html">Request a Delivery</a></li>

            <li><a href="#">Contact Us</a></li>
        </ul>
    </nav>

    <!-- start the page main -->
    <main>
        <h1>Request a delivery</h1>

        <form method="get" class="myForm" action="thanks.html">

            <fieldset>
                <legend>Customer Information</legend>
                <label>First Name*<input type="text" name="fname" required></label>
                <label>Last Name*<input type="text" name="lname" required></label>
                <label>Cell Number*<input type="tel" name="phone" required placeholder="987-555-1234"></label>
            </fieldset>

            <fieldset>
                <legend>Delivery Method </legend>

                <label><input type="radio" name="method" value="drone">Drone Delivery (2hrs)</label>
                <label><input type="radio" name="method" value="cycle"> Motorcycle (4hrs)</label>
                <label><input type="radio" name="method" value="robot">Robot Delivery (6hrs)</label>

            </fieldset>

            <fieldset>
                <legend> Delivery Options</legend>
                <label> <input type="checkbox" name="porch" value="selected"> Front Porch</label>
                <label> <input type="checkbox" name="deck" value="selected"> Back Deck</label>
                <label> <input type="checkbox" name="driveway" value="selected"> Driveway</label>
                <label> <input type="checkbox" name="garage" value="selected"> Inside the Garage</label>

                <label> Preferred Delivery Time
                    <select name="time">
                        <option value="none">Please select</option>
                        <option value="Morning"> Between 7:00AM and 11:00 AM</option>
                        <option value="Noon"> Between 11:00AM and 2:00PM</option>
                        <option value="Afternoon"> Between 2:00PM and 5:00PM</option>
                        <option value="Evening"> Between 5:00 PM and 8:00 PM</option>
                    </select>
                </label>

            </fieldset>

<label>
Comments<textarea name="Comments"></textarea>
</label>

            <input type="submit" value="Send Delivery Request">
        </form>

    </main>

    <!-- start the page footer -->
    <footer>
        <p>&copy;202X &bull; Drone Delivery Services &bull; <a href="mailto:zen@gmail.com">Email Us</a> </p>
    </footer>
</body>

</html>
